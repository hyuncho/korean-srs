<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <title>되새김 · Korean SRS</title>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="menu-btn" class="icon-btn" aria-label="Menu" aria-expanded="false" aria-controls="menu">☰</button>
      <div id="topbar-title">Study</div>
      <button id="lang-btn" class="icon-btn lang-btn" aria-label="Language">🌐<span>EN</span></button>
    </header>
    <nav id="menu" hidden>
      <button data-route="home" class="menu-item active">📚 <span>Study</span></button>
      <button data-route="stats" class="menu-item">📊 <span>Stats</span></button>
      <button data-route="words" class="menu-item">🗂️ <span>Words</span></button>
      <button data-route="settings" class="menu-item">⚙️ <span>Settings</span></button>
    </nav>
    <div id="menu-scrim" hidden></div>
    <main id="view"></main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
